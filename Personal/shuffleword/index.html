<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Shuffler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

    <div class="container" style="max-width: 500px;">
        <h1 class="text-center text-primary mb-4">Word Shuffler</h1>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <label class="form-label fw-bold">Enter any word:</label>
                
                <div class="input-group mb-3">
                    <input type="text" id="wordInput" class="form-control" placeholder="e.g. HELLO">
                    <button onclick="shuffleWord()" class="btn btn-primary fw-bold">Shuffle</button>
                </div>
            </div>
        </div>

        <div id="resultBox" class="alert alert-secondary shadow-sm text-center" style="min-height: 100px;">
            <span class="text-muted">Results will appear here...</span>
        </div>
    </div>

    <script>
        const el = document.getElementById('resultBox');

        async function shuffleWord() {
            const word = document.getElementById('wordInput').value;

            if (word == "") {
                alert("Please enter a word");
                return;
            }

            el.className = "alert alert-info shadow-sm text-center";
            el.innerHTML = "<strong>Shuffling...</strong>";

            const uri = "/backend.php?word=" + word;
            
            // Send request to API
            const result = await fetch(uri).then((response) => response.json())
            .catch(error => alert(error));
            
            // Handle the JSON response
            if (result.error) {
                el.className = "alert alert-danger shadow-sm text-center";
                el.innerHTML = "<h4>" + result.error + "</h4>";
            } else {
                el.className = "alert alert-success shadow-sm text-center";
                el.innerHTML = "<h3>Random Shuffle: <strong>" + result.shuffled + "</strong></h3>";
                el.innerHTML += "<hr>";
                el.innerHTML += "<p class='mb-0'>There are <strong>" + result.combinations + "</strong> ways to arrange the letters in " + result.original + ".</p>";
            }
        }
    </script>
</body>
</html>
