<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="calculator">
            <h1>Calculator</h1>
            <div class="fline">
                <div id="result">
                    <p>0</p>
                </div>
            </div>
            <div class="s-line">
                <div class="lines">
                    <button class="box">C</button>
                    <button class="box">√</button>
                    <button class="box">*</button>
                    <button class="box">DEL</button>
                </div>
                <div class="lines">
                    <button class="box">9</button>
                    <button class="box">8</button>
                    <button class="box">7</button>
                    <button class="box">+</button>
                </div>
                <div class="lines">
                    <button class="box">6</button>
                    <button class="box">5</button>
                    <button class="box">4</button>
                    <button class="box">-</button>
                </div>
                <div class="lines">
                    <button class="box">3</button>
                    <button class="box">2</button>
                    <button class="box">1</button>
                    <button class="box">x</button>
                </div>
                <div class="lines">
                    <button class="box">0</button>
                    <button class="box">.</button>
                    <button class="box">=</button>
                    <button class="box">/</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
