<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        color: white;
    }
    .container {
        width: 30%;
        height: auto;
        border-radius: 10%;
        background-color: navy;
        padding: 0.1rem;
    }
</style>

<body>
    <div class="body">
        <div class="container">
            <h2>Genotype Compatibility Checker</h2>

            <input type="text" id="genotype1" placeholder="Enter first genotype">
            <br><br>

            <input type="text" id="genotype2" placeholder="Enter second genotype">
            <br><br>

            <button onclick="checkCompatibility()">
                Check Compatibility
            </button>

            <h3 id="result"></h3>
        </div>
    </div>

    <script>

        function checkCompatibility() {

            let genotype1 = document.getElementById("genotype1").value.toUpperCase();
            let genotype2 = document.getElementById("genotype2").value.toUpperCase();

            let result = document.getElementById("result");

            let validGenotypes = ["AA", "AS", "SS"];

            if (
                !validGenotypes.includes(genotype1) ||
                !validGenotypes.includes(genotype2)
            ) {

                result.textContent = "Only AA, AS and SS are allowed.";
            }

            else if (genotype1 === "SS" && genotype2 === "SS") {

                result.textContent = "Not Compatible";

            }

            else if (genotype1 === "AS" && genotype2 === "AS") {

                result.textContent = "Compatible but risky";

            }

            else if (
                (genotype1 === "AS" && genotype2 === "SS") ||
                (genotype1 === "SS" && genotype2 === "AS")
            ) {

                result.textContent = "Not Advisable";

            }

            else {

                result.textContent = "Compatible";

            }

        }

    </script>

</body>
