<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="calculator.css">
</head>

<body>

  <div class="calculator">

    <div class="display">
      <p class="title">Calculator</p>
      <h1 class="result">0</h1>
    </div>

    <div class="buttons">

      <button class="btn">MC</button>
      <button class="btn">MR</button>
      <button class="btn">M+</button>
      <button class="btn">M-</button>
      <button class="btn">MS</button>

      <button class="btn">sin</button>
      <button class="btn">cos</button>
      <button class="btn">tan</button>
      <button class="btn">CE</button>
      <button class="btn">C</button>

      <button class="btn">x<sup>2</sup></button>
      <button class="btn">x<sup>3</sup></button>
      <button class="btn">&#8730;</button>
      <button class="btn">÷</button>
      <button class="btn">×</button>

      <button class="btn">7</button>
      <button class="btn">8</button>
      <button class="btn">9</button>
      <button class="btn">−</button>
      <button class="btn">+</button>

      <button class="btn">4</button>
      <button class="btn">5</button>
      <button class="btn">6</button>
      <button class="btn">(</button>
      <button class="btn">)</button>

      <button class="btn">1</button>
      <button class="btn">2</button>
      <button class="btn">3</button>
      <button class="btn">&#960;</button>
      <button class="btn">n!</button>

      <button class="btn">0</button>
      <button class="btn">.</button>
      <button class="btn equal">=</button>

    </div>

  </div>

</body>

</html>
