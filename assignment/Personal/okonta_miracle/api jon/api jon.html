<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Recipes</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f9f9f9;
        }

             
        .loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: #fff;
            z-index: 999;
        }

        .loader-icon {
            font-size: 52px;
            animation: bounce 1.2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        .loader-title {
            font-size: 16px;
            font-weight: 600;
            color: #222;
            letter-spacing: 0.3px;
        }

        .loader-subtitle {
            font-size: 13px;
            color: #888;
        }

        .progress-track {
            width: 240px;
            height: 5px;
            background: #e5e5e5;
            border-radius: 999px;
            overflow: hidden;b
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #6c5ce7;
            border-radius: 999px;
            transition: width 0.1s linear;
        }

        .loader-dots {
            display: flex;
            gap: 6px;
        }

        .loader-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6c5ce7;
            animation: dotPulse 1.2s ease-in-out infinite;
        }

        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50%       { opacity: 1;   transform: scale(1);   }
        }

        
        #recipesWrapper {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 16px;
        }

        .recipe-card {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 16px;
            background: #fff;
            margin-bottom: 20px;
        }

        img {
            width: 40%;
            border-radius: 8px;
        }
        body{
            background-color: gray;
            text-align: center;
            text-decoration: none;
                   }

    </style>
</head>

<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="loader-icon">🍽️</div>
        <p class="loader-title" id="loaderTitle">Gathering ingredients…</p>
        <p class="loader-subtitle" id="loaderSub">Preparing your recipes</p>
        <div class="progress-track">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="loader-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div id="recipesWrapper"></div>

    <script>
        const loader     = document.getElementById("loadingScreen");
        const bar        = document.getElementById("progressBar");
        const titleEl    = document.getElementById("loaderTitle");
        const subEl      = document.getElementById("loaderSub");
        const recipeContainer = document.getElementById("recipesWrapper");

        const steps = [
            ["Gathering ingredients…",   "Sourcing the freshest picks"],
            ["Heating things up…",        "Getting the kitchen ready"],
            ["Mixing it all together…",   "Almost done cooking"],
            ["Plating your dishes…",      "Just a moment more"],
            ["Ready to serve!",           "Bon appetit 🍴"],
        ];

        const DURATION = 5000;
        let elapsed = 0;

        const loaderTimer = setInterval(() => {
            elapsed += 50;
            const pct  = Math.min((elapsed / DURATION) * 100, 100);
            bar.style.width = pct + "%";

            const idx = Math.min(
                Math.floor((elapsed / DURATION) * steps.length),
                steps.length - 1
            );
            titleEl.textContent = steps[idx][0];
            subEl.textContent   = steps[idx][1];

            if (elapsed >= DURATION) clearInterval(loaderTimer);
        }, 50);

        
        const dataPromise = fetch("https://dummyjson.com/recipes").then(r => r.json());
        const timePromise = new Promise(res => setTimeout(res, DURATION));

        Promise.all([dataPromise, timePromise])
            .then(([data]) => {
                loader.style.display = "none";

                let result = "";

                data.recipes.forEach(recipe => {
                    let instructionsList = "";
                    recipe.instructions.forEach(step => {
                        instructionsList += `<li>${step}</li>`;
                    });

                    result += `
                        <div class="recipe-card">
                            <h3>${recipe.name}</h3>
                            <img src="${recipe.image}" alt="${recipe.name}"/>
                            <p><b>Ingredients:</b> ${recipe.ingredients.join(", ")}</p>
                            <b>Instructions:</b>
                            <ul>${instructionsList}</ul>
                            <p><b>Difficulty:</b> ${recipe.difficulty}</p>
                        </div>
                    `;
                });

                recipeContainer.innerHTML = result;
            })
            .catch(err => {
                loader.style.display = "none";
                recipeContainer.innerHTML = "<p>Failed to load recipes.</p>";
                console.error(err);
            });
    </script>

</body>
</html>
