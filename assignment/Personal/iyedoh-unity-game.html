<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ball Controller</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #111;
            color: white;
            font-family: Arial;
        }

        .game-area {
            width: 400px;
            height: 400px;
            border: 3px solid white;
            position: relative;
            margin-top: 50px;
            overflow: hidden;
        }

        #ball {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #ff4d4d, #990000);
            border-radius: 50%;
            position: absolute;
            top: 180px;
            left: 180px;

            /* smoother animation */
            transition: all 0.15s ease;

            /* glow effect */
            box-shadow: 0 0 15px red;
        }

        /* bounce effect */
        .bounce {
            transform: scale(1.2);
        }

        .controller {
            margin-top: 30px;
            text-align: center;
        }

        button {
            padding: 15px 20px;
            margin: 5px;
            font-size: 20px;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
            border-radius: 10px;
        }

        button:hover {
            background: #555;
        }
    </style>

</head>

<body>

    <div class="game-area">
        <div id="ball"></div>
    </div>

    <div class="controller">
        <button onclick="move('up')">⬆️</button>
        <div>
            <button onclick="move('left')">⬅️</button>
            <button onclick="move('down')">⬇️</button>
            <button onclick="move('right')">➡️</button>
        </div>
    </div>

    <script>
        const ball = document.getElementById("ball");

        let x = 180;
        let y = 180;
        const step = 20;

        function bounceEffect() {
            ball.classList.add("bounce");
            setTimeout(() => {
                ball.classList.remove("bounce");
            }, 150);
        }

        function move(direction) {

            if (direction === "up") y -= step;
            if (direction === "down") y += step;
            if (direction === "left") x -= step;
            if (direction === "right") x += step;

            // wall bounce detection
            if (x <= 0 || x >= 360 || y <= 0 || y >= 360) {
                bounceEffect();
            }

            // keep inside box
            x = Math.max(0, Math.min(360, x));
            y = Math.max(0, Math.min(360, y));

            ball.style.left = x + "px";
            ball.style.top = y + "px";
        }

        // keyboard support added 🔥
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp" || e.key === "w") move("up");
            if (e.key === "ArrowDown" || e.key === "s") move("down");
            if (e.key === "ArrowLeft" || e.key === "a") move("left");
            if (e.key === "ArrowRight" || e.key === "d") move("right");
        });
    </script>

</body>

</html>
