<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Recipe API</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        .search-box {
            text-align: center;
            margin: 20px;
        }

        input {
            padding: 12px;
            width: 250px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 12px;
            background: grey;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 5px;
        }

        #meals {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .meal {
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }


        .meal img {
            width: 100%;
        }

        .meal h3 {
            padding: 10px;
        }

        .meal button {
            margin: 10px;
            width: 90%;
        }

        /* DETAILS MODAL */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            padding: 20px;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 10px;
        }

        .modal-content img {
            width: 100%;
            border-radius: 10px;
        }

        .close {
            float: right;
            cursor: pointer;
            font-size: 20px;
            color: red;
        }

        /* LOADER */
        .loader {
            text-align: center;
            font-size: 18px;
            color: grey;
            padding: 20px;
        }
    </style>
</head>

<body>

    <h1> Recipe API Finder</h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search meals...">
        <button onclick="searchMeal()">Search</button>
    </div>

    <div id="meals"></div>

    <!-- MODAL -->
    <div id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">✖</span>
            <div id="mealDetails"></div>
        </div>
    </div>

    <script>
        const mealsContainer = document.getElementById("meals");
        const modal = document.getElementById("modal");
        const mealDetails = document.getElementById("mealDetails");

        // LOAD DEFAULT MEALS
        window.onload = () => loadMeals("chicken");

        // LOADER
        function showLoader() {
            mealsContainer.innerHTML = "<div class='loader'>⏳ Please wait...</div>";
        }

        // FETCH MEALS
        function loadMeals(query) {
            showLoader();

            fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`)
                .then(res => res.json())
                .then(data => displayMeals(data.meals));
        }

        // SEARCH
        function searchMeal() {
            const query = document.getElementById("searchInput").value;
            if (!query) return;
            loadMeals(query);
        }

        // DISPLAY MEALS
        function displayMeals(meals) {
            mealsContainer.innerHTML = "";

            if (!meals) {
                mealsContainer.innerHTML = "<p>No meals found 😢</p>";
                return;
            }

            meals.forEach(meal => {
                mealsContainer.innerHTML += `
            <div class="meal">
                <img src="${meal.strMealThumb}">
                <h3>${meal.strMeal}</h3>
                <button onclick="getMealDetails('${meal.idMeal}')">View Recipe</button>
            </div>
        `;
            });
        }

        // GET DETAILS
        function getMealDetails(id) {
            modal.style.display = "flex";
            mealDetails.innerHTML = "<div class='loader'>⏳ Please wait...</div>";

            fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${id}`)
                .then(res => res.json())
                .then(data => showMealDetails(data.meals[0]));
        }

        // SHOW DETAILS + INGREDIENTS
        function showMealDetails(meal) {

            let ingredients = "";

            for (let i = 1; i <= 20; i++) {
                let ingredient = meal[`strIngredient${i}`];
                let measure = meal[`strMeasure${i}`];

                if (ingredient && ingredient.trim() !== "") {
                    ingredients += `<li>${measure} ${ingredient}</li>`;
                }
            }

            mealDetails.innerHTML = `
        <h2>${meal.strMeal}</h2>
        <img src="${meal.strMealThumb}">

        <p><strong>Category:</strong> ${meal.strCategory}</p>
        <p><strong>Area:</strong> ${meal.strArea}</p>

        <h3>🧂 Ingredients</h3>
        <ul>${ingredients}</ul>

        <h3>📖 Instructions</h3>
        <p>${meal.strInstructions}</p>
    `;
        }

        // CLOSE MODAL
        function closeModal() {
            modal.style.display = "none";
        }
    </script>

</body>

</html>
