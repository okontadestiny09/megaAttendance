<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="calculator">


    <div class="title-bar">
      <span class="app-title">Calculator</span>
    </div>


    <div class="header">
      <span class="menu-icon"></span>
      <span class="mode-title">Scientific</span>
    </div>


    <div class="display">
      <span class="display-number">0</span>
    </div>



    <div class="btn-row">
      <button class="btn sci">x<sup>2</sup></button>
      <button class="btn sci">x<sup>y</sup></button>
      <button class="btn sci">sin</button>
      <button class="btn sci">cos</button>
      <button class="btn sci">tan</button>
      <button class="btn op">CE</button>
      <button class="btn op">C</button>
      <button class="btn op del">*</button>
      <button class="btn op oper">/</button>
    </div>


    <div class="btn-row">
      <button class="btn sci">x<sup>3</sup></button>
      <button class="btn sci"><sup>y</sup>x</button>
      <button class="btn sci">sin<sup>-1</sup></button>
      <button class="btn sci">cos<sup>-1</sup></button>
      <button class="btn sci">tan<sup>-1</sup></button>
      <button class="btn num">7</button>
      <button class="btn num">8</button>
      <button class="btn num">9</button>
      <button class="btn op oper">%</button>
    </div>


    <div class="btn-row">
      <button class="btn sci"></button>
      <button class="btn sci">10<sup>x</sup></button>
      <button class="btn sci">log</button>
      <button class="btn sci">Exp</button>
      <button class="btn sci">Mod</button>
      <button class="btn num">4</button>
      <button class="btn num">5</button>
      <button class="btn num">6</button>
      <button class="btn op oper">-</button>
    </div>


    <div class="btn-row">
      <button class="btn sci"><sup>1</sup>x</button>
      <button class="btn sci">e<sup>x</sup></button>
      <button class="btn sci">ln</button>
      <button class="btn sci">dms</button>
      <button class="btn sci">deg</button>
      <button class="btn num">1</button>
      <button class="btn num">2</button>
      <button class="btn num">3</button>
      <button class="btn op oper">+</button>
    </div>


    <div class="btn-row">
      <button class="btn sci"></button>
      <button class="btn sci">;</button>
      <button class="btn sci">n!</button>
      <button class="btn sci">(</button>
      <button class="btn sci">)</button>
      <button class="btn num"></button>
      <button class="btn num">0</button>
      <button class="btn num">.</button>
      <button class="btn op equals">=</button>
    </div>

  </div>


  </div>


</body>

</html>
