<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        body {
            height: 100vh;
            background-color: #dbeafe;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-box {
            width: 360px;
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.2);
        }

        .main-box h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e3a8a;
            font-size: 28px;
        }

        .top-section {
            display: flex;
            margin-bottom: 20px;
            gap: 10px;
        }

        .top-section input {
            flex: 1;
            padding: 12px;
            border: 2px solid #93c5fd;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }

        .top-section button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background-color: #2563eb;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .top-section button:hover {
            background-color: #1d4ed8;
        }

        .task-area {
            max-height: 300px;
            overflow-y: auto;
        }

        .task-card {
            background-color: #eff6ff;
            border-left: 5px solid #2563eb;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-card span {
            color: #1e293b;
            font-size: 15px;
        }

        .delete-task {
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 7px 10px;
            border-radius: 7px;
            cursor: pointer;
        }

        .delete-task:hover {
            background-color: #991b1b;
        }
    </style>
</head>

<body>

    <div class="main-box">

        <h1>Task Board</h1>

        <div class="top-section">
            <input type="text" id="userInput" placeholder="Enter your task">
            <button id="taskBtn">Add</button>
        </div>

        <div class="task-area" id="taskContainer"></div>

    </div>


    <script>

        const taskButton = document.getElementById("taskBtn");
        const taskInput = document.getElementById("userInput");
        const taskContainer = document.getElementById("taskContainer");

        taskButton.addEventListener("click", function () {

            let inputValue = taskInput.value;

            if (inputValue.trim() === "") {
                return;
            }

            const newTask = document.createElement("div");
            newTask.classList.add("task-card");

            const taskText = document.createElement("span");
            taskText.innerText = inputValue;

            const removeBtn = document.createElement("button");
            removeBtn.innerText = "Delete";
            removeBtn.classList.add("delete-task");

            removeBtn.addEventListener("click", function () {
                newTask.remove();
            });

            newTask.appendChild(taskText);
            newTask.appendChild(removeBtn);

            taskContainer.appendChild(newTask);

            taskInput.value = "";

        });

    </script>

</body>

</html>
