<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Meals</title>

    <link rel="stylesheet" href="/bootstrap/bootstrap.css">

    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, Helvetica, sans-serif;
        }

        .heading {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 30px;
            color: #d35400;
            font-size: 45px;
            font-weight: bold;
        }

        .food-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .food-box {
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .food-box:hover {
            transform: translateY(-5px);
        }

        .food-box img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .food-info {
            padding: 15px;
        }

        .food-info h3 {
            margin-bottom: 10px;
            color: #1e293b;
        }

        .food-info p {
            color: #555;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <h1 class="heading">Tasty Meals</h1>

    <div class="container">
        <div id="foodArea" class="food-wrapper"></div>
    </div>

    <script>

        const foodArea = document.getElementById("foodArea");

        let savedMeals = localStorage.getItem("foodData");

        function displayMeals(foodItems) {

            foodItems.forEach((item) => {

                foodArea.innerHTML += `

                <div class="food-box">

                    <img src="${item.strCategoryThumb}" alt="${item.strCategory}">

                    <div class="food-info">

                        <h3>${item.strCategory}</h3>

                        <p>
                            ${item.strCategoryDescription.substring(0, 120)}...
                        </p>

                    </div>

                </div>

                `;

            });

        }

        if (savedMeals) {

            let convertedMeals = JSON.parse(savedMeals);

            displayMeals(convertedMeals);

        } else {

            fetch("https://www.themealdb.com/api/json/v1/1/categories.php")

                .then((result) => result.json())

                .then((responseData) => {

                    localStorage.setItem(
                        "foodData",
                        JSON.stringify(responseData.categories)
                    );

                    displayMeals(responseData.categories);

                })

                .catch((mistake) => {

                    console.log("Something went wrong");

                    console.log(mistake);

                });

        }

    </script>

</body>

</html>
